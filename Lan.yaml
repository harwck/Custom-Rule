port: 8888
socks-port: 7891
redir-port: 0
allow-lan: true
mode: Rule
log-level: info
external-controller: 0.0.0.0:6170
secret: ""
Proxy:
  - type: socks5
    name: 🌏 Lan Forwarding
    server: 192.168.1.2
    port: 7891
    udp: true
Proxy Group:
  - name: 📤 Relay
    type: select
    proxies:
      - DIRECT
      - 🌏 Lan Forwarding
Rule:
  - MATCH,📤 Relay
