[General]
loglevel = notify
skip-proxy = 127.0.0.1, 192.168.0.0/16, 193.168.0.0/24, 10.0.0.0/8, 10.1.10.0/8, 172.16.0.0/12, 100.64.0.0/10,localhost,*.local
dns-server = system, 223.5.5.5, 119.29.29.29, 114.114.114.114
external-controller-access = password@0.0.0.0:6170
show-error-page-for-reject = true
exclude-simple-hostnames = true
enhanced-mode-by-rule = false
allow-wifi-access = true
socks5-listen = 0.0.0.0:8888
http-listen = 0.0.0.0:8887
wifi-access-socks5-port = 8888
wifi-access-http-port = 8889
debug-cpu-usage = false
ipv6 = false
internet-test-url = http://www.gstatic.com/generate_204
proxy-test-url = http://www.gstatic.com/generate_204
test-timeout = 5

[Replica]
hide-crashlytics-request=true
hide-apple-request=false
use-keyword-filter=false

[Proxy]
Direct = direct

[Proxy Group]
Netflix = select, Hong Kong, United States, Korea, Direct
MainlandChina = select, Back, Direct
# Proxy list
Back = select, policy-path=https://dler.cloud/subscribe/QNe9mbi3eqBecvDB?list=1&area=cn
HK = select, policy-path=https://dler.cloud/subscribe/QNe9mbi3eqBecvDB?list=1&class=bronze&area=hk
Korea = select, policy-path=https://dler.cloud/subscribe/QNe9mbi3eqBecvDB?list=1&class=bronze&area=kr
United States = select, policy-path=https://dler.cloud/subscribe/QNe9mbi3eqBecvDB?list=1&class=bronze&area=us

[Rule]
RULE-SET,https://github.com/harwck/Custom-Rule/raw/master/NetflixList,Netflix
RULE-SET,https://github.com/scomper/surge-list/raw/master/cn.list,MainlandChina
RULE-SET,https://github.com/ConnersHua/Profiles/raw/master/Surge/Ruleset/China.list,MainlandChina

RULE-SET,LAN,Direct
GEOIP,CN,🇨🇳 Back
FINAL,Direct,dns-failed

[Host]
*.aliqin.com = server:223.6.6.6
*.tmall.com = server:223.6.6.6
*.taobao.com = server:223.6.6.6
*.ali*.com = server:223.6.6.6
*.upyun.com = server:223.6.6.6
*.mmstat.com = server:223.6.6.6
